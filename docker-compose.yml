version: "3.9"

services:

  postgis:
    image: postgis/postgis:16-3.4-alpine
    container_name: chicago_postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chicago_ndvi}
      POSTGRES_USER: ${POSTGRES_USER:-ndvi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ndvi_user} -d ${POSTGRES_DB:-chicago_ndvi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg_tileserv:
    image: pramsey/pg_tileserv:latest
    container_name: chicago_tileserv
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ndvi_user}:${POSTGRES_PASSWORD}@postgis:5432/${POSTGRES_DB:-chicago_ndvi}
      PGTILESERV_LISTEN: "0.0.0.0:7800"
    depends_on:
      postgis:
        condition: service_healthy
    ports:
      - "7800:7800"

  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: chicago_pipeline
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ndvi_user}:${POSTGRES_PASSWORD}@postgis:5432/${POSTGRES_DB:-chicago_ndvi}
      POSTGRES_DB: ${POSTGRES_DB:-chicago_ndvi}
      POSTGRES_USER: ${POSTGRES_USER:-ndvi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgis
      CDSE_USERNAME: ${CDSE_USERNAME}
      CDSE_PASSWORD: ${CDSE_PASSWORD}
      AWS_DEFAULT_REGION: us-west-2
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./pipeline:/app
      - raster_scratch:/tmp/rasters
    depends_on:
      postgis:
        condition: service_healthy

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: chicago_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ndvi_user}:${POSTGRES_PASSWORD}@postgis:5432/${POSTGRES_DB:-chicago_ndvi}
    depends_on:
      postgis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    image: nginx:alpine
    container_name: chicago_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "8080:80"

volumes:
  postgis_data:
  raster_scratch:
