databases:
  - name: chicago-ndvi-db
    databaseName: chicago_ndvi
    user: ndvi_user
    plan: free

services:
  - type: web
    name: chicago-ndvi-api
    runtime: python
    plan: free
    buildCommand: pip install -r api/requirements.txt && python scripts/init_db.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chicago-ndvi-db
          property: connectionString
